<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVE INDEX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #010101;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

h1 {
  font-family: 'Archivo Black', sans-serif;
  font-weight: 900;
  font-size: clamp(3rem, 12vw, 11rem);
  letter-spacing: -.02em;
  text-transform: uppercase;
  color: #ccff00;
  user-select: none;
  line-height: 1;
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 20px rgba(204,255,0,0.4); }
  50%       { text-shadow: 0 0 40px rgba(204,255,0,0.9), 0 0 80px rgba(204,255,0,0.3); }
}

.under {
  font-family: 'Archivo Black', sans-serif;
  font-size: clamp(0.6rem, 1.2vw, 0.85rem);
  letter-spacing: .4em;
  text-transform: uppercase;
  color: #ccff00;
  opacity: .3;
  margin-top: 16px;
}

/* Player */
.player-wrap {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.track-info {
  text-align: center;
  display: flex;
  gap: 10px;
  align-items: baseline;
}
.track-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 10px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: #ccff00;
  opacity: .5;
}
.track-sep {
  font-family: 'Archivo Black', sans-serif;
  font-size: 10px;
  color: #ccff00;
  opacity: .2;
}
.track-artist {
  font-family: 'Archivo Black', sans-serif;
  font-size: 10px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: #ccff00;
  opacity: .2;
}

/* Waveform bars */
.waveform {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 32px;
}
.bar {
  width: 2px;
  background: #ccff00;
  border-radius: 1px;
  height: 3px;
  opacity: .4;
  transition: height .1s;
}
.waveform.playing .bar {
  animation: wave var(--d, 1s) ease-in-out infinite var(--dl, 0s);
  opacity: .6;
}
@keyframes wave {
  0%, 100% { height: 3px; }
  50% { height: var(--h, 16px); }
}

/* Mute */
#mute {
  position: fixed;
  bottom: 28px; right: 28px;
  background: none; border: none;
  cursor: pointer; padding: 6px;
  opacity: .3; transition: opacity .2s;
  line-height: 0;
}
#mute:hover { opacity: 1; }
#mute svg { width: 18px; height: 18px; fill: #ccff00; display: block; }

/* SC caché */
#sc {
  position: fixed;
  width: 1px; height: 1px;
  opacity: 0; pointer-events: none;
  bottom: 0; left: 0;
}
</style>
</head>
<body>

<h1>NOVE INDEX</h1>
<div class="under">Under Development</div>

<iframe id="sc"
  src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/2055623164&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=false"
  allow="autoplay">
</iframe>

<div class="player-wrap">
  <div class="track-info">
    <span class="track-title">In Vitro</span>
    <span class="track-sep">—</span>
    <span class="track-artist">TN_</span>
  </div>

  <div class="waveform" id="waveform">
    <div class="bar" style="--d:1.1s;--dl:0s;--h:28px"></div>
    <div class="bar" style="--d:0.8s;--dl:.05s;--h:14px"></div>
    <div class="bar" style="--d:1.3s;--dl:.1s;--h:32px"></div>
    <div class="bar" style="--d:0.9s;--dl:.08s;--h:20px"></div>
    <div class="bar" style="--d:1.0s;--dl:.15s;--h:26px"></div>
    <div class="bar" style="--d:1.2s;--dl:.03s;--h:18px"></div>
    <div class="bar" style="--d:0.7s;--dl:.12s;--h:30px"></div>
    <div class="bar" style="--d:1.4s;--dl:.06s;--h:22px"></div>
    <div class="bar" style="--d:0.85s;--dl:.18s;--h:16px"></div>
    <div class="bar" style="--d:1.1s;--dl:.09s;--h:28px"></div>
    <div class="bar" style="--d:0.95s;--dl:.14s;--h:24px"></div>
    <div class="bar" style="--d:1.25s;--dl:.04s;--h:32px"></div>
    <div class="bar" style="--d:0.75s;--dl:.11s;--h:18px"></div>
    <div class="bar" style="--d:1.0s;--dl:.07s;--h:26px"></div>
    <div class="bar" style="--d:1.15s;--dl:.16s;--h:20px"></div>
    <div class="bar" style="--d:0.9s;--dl:.02s;--h:30px"></div>
    <div class="bar" style="--d:1.3s;--dl:.13s;--h:14px"></div>
    <div class="bar" style="--d:0.8s;--dl:.08s;--h:28px"></div>
    <div class="bar" style="--d:1.05s;--dl:.17s;--h:22px"></div>
    <div class="bar" style="--d:1.2s;--dl:.05s;--h:32px"></div>
  </div>
</div>

<button id="mute" aria-label="Mute / Unmute">
  <svg id="iconOn" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  <svg id="iconOff" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
</button>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
  const widget = SC.Widget(document.getElementById('sc'));
  const waveform = document.getElementById('waveform');
  let muted = false;

  widget.bind(SC.Widget.Events.PLAY, () => {
    waveform.classList.add('playing');
  });
  widget.bind(SC.Widget.Events.PAUSE, () => {
    waveform.classList.remove('playing');
  });
  widget.bind(SC.Widget.Events.READY, () => {
    waveform.classList.add('playing');
  });

  document.getElementById('mute').addEventListener('click', () => {
    muted = !muted;
    widget.setVolume(muted ? 0 : 100);
    document.getElementById('iconOn').style.display  = muted ? 'none'  : 'block';
    document.getElementById('iconOff').style.display = muted ? 'block' : 'none';
    waveform.classList.toggle('playing', !muted);
  });
</script>
</body>
</html>
